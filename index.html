<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBudget AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="auth-status" class="hidden">
        <span id="display-email" style="font-size: 0.8rem; opacity: 0.7;"></span>
        <button onclick="handleLogout()" class="btn-logout"><i class="fa-solid fa-power-off"></i></button>
    </div>

    <div class="main-title">EBudget <span>AI</span></div>

    <div class="app-container">
        <div id="view-dashboard" class="view active">
            <div class="card">
                <div style="font-size: 3rem; margin-bottom: 20px;">🤖</div>
                <h1>Analyse Budgétaire IA</h1>
                <p style="color: var(--text-dim);">Optimisez vos finances avec précision et sécurité. Coach personnel intégré.</p>
                <button onclick="startQuiz()" class="btn-primary">Démarrer l'expérience</button>
            </div>
        </div>

        <div id="view-quiz" class="view">
            <div class="card">
                <div id="q-icon" style="font-size: 2.5rem; color: var(--accent); margin-bottom: 15px;"></div>
                <h2 id="q-text"></h2>
                <p id="q-desc" style="color: var(--text-dim); margin-bottom: 20px;"></p>
                
                <div id="input-wrap" class="currency-input">
                    <input type="number" id="q-input" placeholder="0">
                    <span id="q-unit">€</span>
                </div>
                
                <div id="dual-btns" class="button-stack hidden"></div>
                <button id="btn-next" class="btn-primary">Continuer</button>
            </div>
        </div>

        <div id="view-results" class="view">
            <div class="card">
                <p style="color: var(--text-dim);">Reste à vivre mensuel</p>
                <h1 id="res-total" style="font-size: 3.5rem; margin: 10px 0;">0€</h1>
                <p id="res-daily" style="font-weight: bold; color: var(--accent);"></p>
                
                <div id="ai-advice" class="ai-box"></div>

                <button onclick="saveAnalysis()" id="btn-save" class="btn-primary">Enregistrer la déclaration</button>
                <button onclick="location.reload()" style="background:none; border:none; color:var(--text-dim); margin-top:20px; cursor:pointer;">Quitter</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
