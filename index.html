<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBudget AI - Coach Financier Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <nav>
        <div class="container nav-content">
            <div class="logo">EBudget <span style="color:var(--accent)">AI</span></div>
            <div id="auth-status" class="user-badge hidden">
                <span id="display-email"></span>
                <button onclick="handleLogout()" title="Déconnexion"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>
        </div>
    </nav>

    <div class="container">
        
        <!-- VUE AUTHENTIFICATION -->
        <div id="view-auth" class="view active">
            <div class="card">
                <div class="auth-icon"><i class="fa-solid fa-fingerprint"></i></div>
                <h2 id="auth-title">Accès Sécurisé</h2>
                <div class="input-group">
                    <input type="email" id="auth-email" placeholder="Email">
                    <input type="password" id="auth-password" placeholder="Mot de passe">
                </div>
                <button id="btn-auth-primary" class="btn btn-primary" onclick="processAuth()">Se connecter</button>
                <div class="auth-footer">
                    <p class="toggle-link" onclick="toggleAuthMode()" id="auth-toggle">Créer un compte</p>
                    <p class="toggle-link" onclick="forgotPassword()">Mot de passe oublié ?</p>
                </div>
            </div>
        </div>

        <!-- VUE DASHBOARD -->
        <div id="view-dashboard" class="view">
            <div class="card">
                <h2 id="welcome-msg">Bonjour</h2>
                <div id="history-container" class="history-slot">
                    <p class="empty-state">Prêt pour une nouvelle analyse ?</p>
                </div>
                <button class="btn btn-primary" onclick="startQuiz()">
                    <i class="fa-solid fa-bolt"></i> Démarrer l'Analyse
                </button>
            </div>
        </div>

        <!-- VUE QUIZ -->
        <div id="view-quiz" class="view">
            <div class="progress-outer">
                <div id="progress-bar"></div>
            </div>
            <div class="card quiz-card">
                <div id="q-icon" class="quiz-icon"></div>
                <h3 id="q-text">Chargement...</h3>
                <p id="q-desc" class="quiz-desc"></p>
                
                <div id="input-wrap" class="input-group">
                    <input type="number" id="q-input" placeholder="0.00" inputmode="decimal">
                </div>

                <div id="dual-btns" class="hidden">
                    <button onclick="handleChoice(true)" class="btn btn-primary">Oui</button>
                    <button onclick="handleChoice(false)" class="btn btn-outline">Non</button>
                </div>
                <button id="btn-next" class="btn btn-primary">Continuer</button>
                <p onclick="resetQuiz()" class="reset-link">Annuler l'analyse</p>
            </div>
        </div>

        <!-- VUE RÉSULTATS -->
        <div id="view-results" class="view">
            <div class="card result-card">
                <div class="res-header">
                    <span>Libre mensuel estimé</span>
                    <h1 id="res-total">0€</h1>
                </div>
                
                <div class="grid-res">
                    <div class="res-mini-card">
                        <i class="fa-solid fa-chart-line"></i>
                        <span>Épargne cible</span>
                        <b id="res-save" style="color:var(--accent)">0€</b>
                    </div>
                    <div class="res-mini-card">
                        <i class="fa-solid fa-hand-holding-heart"></i>
                        <span>Aides estimées</span>
                        <b id="res-aides" style="color:var(--success)">0€</b>
                    </div>
                </div>

                <div class="ai-box">
                    <div class="ai-header">
                        <i class="fa-solid fa-brain"></i>
                        <span>Diagnostic IA</span>
                    </div>
                    <p id="ai-advice"></p>
                </div>

                <button class="btn btn-primary" onclick="saveBilanCloud()">Sauvegarder l'analyse</button>
                <button class="btn btn-outline" onclick="showView('view-dashboard')">Retour</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
